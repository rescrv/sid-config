DEFAULT_AGENT="build"

# "build" agent configuration
# - Starts automatically when no agent is specified
# - Loads system prompt from agents/build.md
# - Has access to bash and edit tools (both require manual approval)
build_ENABLED="YES"
build_NAME="sid"
build_DESC="UNIX-inspired coding agent for careful, file-centric work"
build_TOOLS="bash edit"
build_MODEL="claude-opus-4-8"
build_SKILLS="*"
build_MAX_TOKENS="128000"
build_THINKING="adaptive"
build_EFFORT="high"
build_USER_INSTRUCTIONS_HOOK="skill-inject"

fable_ALIASES="build"
fable_ENABLED="YES"
fable_INHERIT="YES"
fable_MODEL="claude-fable-5"

deepseek_v4_pro_ALIASES="build"
deepseek_v4_pro_ENABLED="YES"
deepseek_v4_pro_INHERIT="YES"
deepseek_v4_pro_API_KEY="file://fireworks.key"
deepseek_v4_pro_BASE_URL="https://api.fireworks.ai/inference"
deepseek_v4_pro_MODEL="accounts/fireworks/models/deepseek-v4-pro"

kimi_k2p6_ALIASES="build"
kimi_k2p6_ENABLED="YES"
kimi_k2p6_INHERIT="YES"
kimi_k2p6_API_KEY="file://fireworks.key"
kimi_k2p6_BASE_URL="https://api.fireworks.ai/inference"
kimi_k2p6_MODEL="accounts/fireworks/models/kimi-k2p6"

# "compact" agent configuration
# - Used internally by /compact to summarize the current session.
# - Kept disabled so it does not appear as a normal interactive agent target.
compact_ENABLED="NO"
compact_NAME="sid compact"
compact_DESC="Conversation compaction agent"
compact_TOOLS=""
